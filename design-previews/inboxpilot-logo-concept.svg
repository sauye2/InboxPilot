  <g transform="translate(132 720)">
    <text x="0" y="-38" class="label">Dark background</text>
    <rect width="560" height="190" rx="38" fill="url(#charcoal)"/>
    <g transform="translate(44 37) scale(.32)">
      <rect width="360" height="360" rx="78" fill="#F6F2E8" opacity="0.06"/>
      <g transform="translate(56 46)">
        <path d="M25 86H223C229.627 86 235 91.373 235 98V194C235 200.627 229.627 206 223 206H25C18.373 206 13 200.627 13 194V98C13 91.373 18.373 86 25 86Z" stroke="url(#teal)" stroke-width="12" stroke-linejoin="round"/>
        <path d="M26 98L118 158C122.008 160.613 127.16 160.561 131.115 157.868L222 96" stroke="url(#teal)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M63 58L222 30C232.797 28.099 240.744 40.071 234.75 49.25L126.5 215.25C120.472 224.494 106.2 219.463 107.225 208.478L115.25 122.5L63 58Z" fill="url(#paper)"/>
        <path d="M63 58L115.25 122.5L222 30L63 58Z" fill="#FFFFFF"/>
        <path d="M115.25 122.5L234 39L126.5 215.25L115.25 122.5Z" fill="#DAD5C9"/>
      </g>
    </g>
    <text x="170" y="114" font-family="Inter, ui-sans-serif, system-ui" font-size="58" font-weight="750" letter-spacing="-2" fill="#FFFDF7">InboxPilot</text>
  </g>

  <g transform="translate(856 720)">
    <text x="0" y="-38" class="label">Light background</text>
    <rect width="560" height="190" rx="38" fill="#FFFDF7" stroke="#E7E0D4"/>
    <g transform="translate(44 37) scale(.32)">
      <rect width="360" height="360" rx="78" fill="url(#charcoal)"/>
      <g transform="translate(56 46)">
        <path d="M25 86H223C229.627 86 235 91.373 235 98V194C235 200.627 229.627 206 223 206H25C18.373 206 13 200.627 13 194V98C13 91.373 18.373 86 25 86Z" stroke="url(#teal)" stroke-width="12" stroke-linejoin="round"/>
        <path d="M26 98L118 158C122.008 160.613 127.16 160.561 131.115 157.868L222 96" stroke="url(#teal)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M63 58L222 30C232.797 28.099 240.744 40.071 234.75 49.25L126.5 215.25C120.472 224.494 106.2 219.463 107.225 208.478L115.25 122.5L63 58Z" fill="url(#paper)"/>
        <path d="M63 58L115.25 122.5L222 30L63 58Z" fill="#FFFFFF"/>
        <path d="M115.25 122.5L234 39L126.5 215.25L115.25 122.5Z" fill="#DAD5C9"/>
      </g>
    </g>
    <text x="170" y="114" font-family="Inter, ui-sans-serif, system-ui" font-size="58" font-weight="750" letter-spacing="-2" fill="#111918">InboxPilot</text>
